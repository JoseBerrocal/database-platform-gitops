apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/JoseBerrocal/database-platform-gitops.git
    targetRevision: main
    path: databases/postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: postgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
