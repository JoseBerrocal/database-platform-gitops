apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elastic-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/JoseBerrocal/database-platform-gitops.git
    targetRevision: main
    path: databases/elasticsearch
  destination:
    server: https://kubernetes.default.svc
    namespace: elasticsearch
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
